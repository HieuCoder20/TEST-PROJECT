{% extends "base.html" %}

{% block title %}Đăng tin mới - Lost & Found{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 px-8 py-6 text-white text-center">
            <h1 class="text-2xl font-bold">Chia sẻ tin tức</h1>
            <p class="text-blue-100 opacity-80">Thông tin chi tiết giúp mọi người tìm đồ nhanh hơn</p>
        </div>

        <form method="POST" class="p-8 space-y-8" id="postForm">
            <!-- Type Toggle -->
            <div class="grid grid-cols-2 gap-4 p-1 bg-gray-100 rounded-2xl">
                <label class="cursor-pointer">
                    <input type="radio" name="item_type" value="lost" class="peer hidden" checked>
                    <div
                        class="py-3 text-center rounded-xl font-bold text-gray-500 peer-checked:bg-white peer-checked:text-red-500 peer-checked:shadow-sm transition">
                        TÔI BỊ MẤT ĐỒ
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="item_type" value="found" class="peer hidden">
                    <div
                        class="py-3 text-center rounded-xl font-bold text-gray-500 peer-checked:bg-white peer-checked:text-green-500 peer-checked:shadow-sm transition">
                        TÔI NHẶT ĐƯỢC ĐỒ
                    </div>
                </label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Loại đồ vật</label>
                    <select name="category" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none">
                        <option value="">-- Chọn danh mục --</option>
                        <option value="Laptop">Laptop / Máy tính</option>
                        <option value="Điện thoại">Điện thoại / Tablet</option>
                        <option value="Ví tiền">Ví tiền / Tiền mặt</option>
                        <option value="Giấy tờ">Giấy tờ tùy thân (CCCD, Thẻ SV...)</option>
                        <option value="Chìa khóa">Chìa khóa</option>
                        <option value="Xe cộ">Phương tiện (Xe máy, Xe đạp...)</option>
                        <option value="Khác">Khác...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Tiêu đề ngắn</label>
                    <input type="text" name="title" required placeholder="Ví dụ: Rơi ví nam tại sảnh G"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Mô tả chi tiết</label>
                <textarea name="description" required rows="4"
                    placeholder="Màu sắc, nhãn hiệu, các đặc điểm nhận dạng đặc biệt..."
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Tòa nhà</label>
                    <select name="location_building" required id="buildingSelect"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none">
                        <option value="">-- Chọn tòa nhà --</option>
                        <option value="Alpha">Tòa Alpha</option>
                        <option value="Beta">Tòa Beta</option>
                        <option value="Gamma">Tòa Gamma</option>
                        <option value="Delta">Tòa Delta</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Số phòng (Nếu có)</label>
                    <input type="text" name="location_room" placeholder="Ví dụ: G201"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Thời gian</label>
                <input type="datetime-local" name="lost_found_time" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-100 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Thông tin liên lạc sẽ hiển thị</label>
                <div class="flex flex-wrap gap-4">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" name="show_email" checked
                            class="w-5 h-5 rounded text-blue-600 focus:ring-blue-400">
                        <span class="text-sm text-gray-600">Email ({{ current_user.email }})</span>
                    </label>
                    {% if current_user.phone %}
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" name="show_phone" checked
                            class="w-5 h-5 rounded text-blue-600 focus:ring-blue-400">
                        <span class="text-sm text-gray-600">SĐT ({{ current_user.phone }})</span>
                    </label>
                    {% endif %}
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 flex items-center justify-center">
                    <span>Đăng bài ngay</span>
                    <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Xử lý chặn đăng trùng lặp bằng AI (Client logic for demo, server side is key)
    const form = document.getElementById('postForm');
    form.onsubmit = function () {
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Đang kiểm tra AI...';
    };
</script>
{% endblock %}

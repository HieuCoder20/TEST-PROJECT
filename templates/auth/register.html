{% extends "base.html" %}

{% block title %}Đăng ký - Lost & Found{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Tham gia cộng đồng</h2>

        <form method="POST">
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Tên đăng nhập</label>
                <input type="text" name="username" id="username" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
            </div>

            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" id="email" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
            </div>

            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu</label>
                <input type="password" name="password" id="password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
                <p class="text-xs text-gray-500 mt-1">Ít nhất 8 ký tự, bao gồm cả chữ và số.</p>
            </div>

            <div class="mb-8">
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Nhập lại mật
                    khẩu</label>
                <input type="password" name="confirm_password" id="confirm_password" required
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition outline-none">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                Tạo tài khoản
            </button>
        </form>

        <p class="mt-8 text-center text-gray-600">
            Đã có tài khoản? <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-bold hover:underline">Đăng
                nhập</a>
        </p>
    </div>
</div>
{% endblock %}
